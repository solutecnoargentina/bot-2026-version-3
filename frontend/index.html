<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solutecno SaaS</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#0f172a;
color:white;
}

.container{
margin-top:50px;
}

img{
margin-top:20px;
background:white;
padding:10px;
border-radius:10px;
}

.status{
margin-top:20px;
font-size:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>Conectar WhatsApp</h1>
<hr>

<h2>Clientes</h2>

<div>
  <h3>Crear Cliente</h3>
  <input id="nombreCliente" placeholder="Nombre">
  <input id="telefonoCliente" placeholder="Teléfono">
  <button onclick="crearCliente()">Crear cliente</button>
</div>

<br>

<div>
  <h3>Lista de Clientes</h3>
  <button onclick="cargarClientes()">Ver clientes</button>
  <ul id="listaClientes"></ul>
</div>
<hr>

<h2>Instancias</h2>

<div>
  <h3>Crear Instancia</h3>
  <input id="clienteIdInstancia" placeholder="ID Cliente">
  <select id="tipoInstancia">
    <option value="demo">Demo</option>
    <option value="pago">Pago</option>
  </select>
  <button onclick="crearInstancia()">Crear instancia</button>
</div>

<br>

<div>
  <h3>Lista de Instancias</h3>
  <button onclick="cargarInstancias()">Ver instancias</button>
  <ul id="listaInstancias"></ul>
</div>
<script>

async function loadQR(){
  try{
    const res = await fetch("http://72.60.12.34:3000/qr");
    const data = await res.json();

    document.getElementById("status").innerText = data.status;

    if(data.qr){
      document.getElementById("qr").src = data.qr;
    }

  }catch(e){
    console.log("Error:", e);
  }
}

// actualizar cada 3 segundos
setInterval(loadQR, 3000);
loadQR();

</script>
<script>

async function cargarClientes(){
  try{
    const res = await fetch("http://72.60.12.34:3000/clientes");
    const data = await res.json();

    const lista = document.getElementById("listaClientes");
    lista.innerHTML = "";

    data.forEach(c => {
      const li = document.createElement("li");
      li.innerText = c.nombre + " - " + c.telefono;
      lista.appendChild(li);
    });

  }catch(e){
    console.log(e);
  }
}

</script>
<script>

async function crearCliente(){
  const nombre = document.getElementById("nombreCliente").value;
  const telefono = document.getElementById("telefonoCliente").value;

  if(!nombre || !telefono){
    alert("Completar datos");
    return;
  }

  try{
    const res = await fetch("http://72.60.12.34:3000/clientes", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        nombre,
        telefono
      })
    });

    const data = await res.json();

    alert(data.status || data.error);

    cargarClientes();

  }catch(e){
    console.log(e);
  }
}

</script>
<script>

async function crearInstancia(){
  const cliente_id = document.getElementById("clienteIdInstancia").value;
  const tipo = document.getElementById("tipoInstancia").value;

  if(!cliente_id){
    alert("Falta ID cliente");
    return;
  }

  try{
    const res = await fetch("http://72.60.12.34:3000/instancias", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        cliente_id,
        tipo
      })
    });

    const data = await res.json();
    alert(data.status || data.error);

    cargarInstancias();

  }catch(e){
    console.log(e);
  }
}

async function cargarInstancias(){
  try{
    const res = await fetch("http://72.60.12.34:3000/instancias");
    const data = await res.json();

    const lista = document.getElementById("listaInstancias");
    lista.innerHTML = "";

    data.forEach(i => {
      const li = document.createElement("li");
      li.innerText = "Cliente " + i.cliente_id + " - " + i.tipo + " - " + i.estado;
      lista.appendChild(li);
    });

  }catch(e){
    console.log(e);
  }
}

</script>
</body>
</html>
