<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solutecno SaaS</title>

<style>
body{
  font-family:Arial;
  background:#0b132b;
  color:white;
  text-align:center;
}

input,button,select{
  padding:8px;
  margin:5px;
}

hr{
  margin:40px 0;
}

.card{
  margin:10px;
  padding:10px;
  border:1px solid #444;
}
</style>

</head>
<body>

<h1>Solutecno SaaS</h1>

<hr>

<h2>Clientes</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<button onclick="crearCliente()">Crear cliente</button>

<br>

<button onclick="verClientes()">Ver clientes</button>

<div id="clientes"></div>

<hr>

<h2>Instancias</h2>

<input id="clienteId" placeholder="ID Cliente">
<select id="tipo">
<option value="demo">Demo</option>
<option value="pago">Pago</option>
</select>

<button onclick="crearInstancia()">Crear instancia</button>

<br>

<button onclick="verInstancias()">Ver instancias</button>

<div id="instancias"></div>

<hr>

<h2>Conectar WhatsApp</h2>

<input id="instanciaId" value="1">
<button onclick="conectarWhatsApp()">Conectar</button>

<div id="qrContainer" style="margin-top:20px;"></div>

<script>

const API = "http://72.60.12.34:3000";

async function crearCliente(){
  const nombre = document.getElementById("nombre").value;
  const telefono = document.getElementById("telefono").value;

  await fetch(API + "/clientes", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ nombre, telefono })
  });

  alert("Cliente creado");
}

async function verClientes(){
  const res = await fetch(API + "/clientes");
  const data = await res.json();

  const container = document.getElementById("clientes");
  container.innerHTML = "";

  data.forEach(c => {
    container.innerHTML += `<div class="card">${c.id} - ${c.nombre} - ${c.telefono}</div>`;
  });
}

async function crearInstancia(){
  const clienteId = document.getElementById("clienteId").value;
  const tipo = document.getElementById("tipo").value;

  await fetch(API + "/instancias", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ clienteId, tipo })
  });

  alert("Instancia creada");
}

async function verInstancias(){
  const res = await fetch(API + "/instancias");
  const data = await res.json();

  const container = document.getElementById("instancias");
  container.innerHTML = "";

  data.forEach(i => {
    container.innerHTML += `
      <div class="card">
        ID: ${i.id} | Cliente: ${i.clienteId} | Tipo: ${i.tipo} | Estado: ${i.estado}
      </div>
    `;
  });
}

async function conectarWhatsApp() {
  const id = document.getElementById("instanciaId").value;

  const container = document.getElementById("qrContainer");
  container.innerHTML = "Cargando QR...";

  try {
    const res = await fetch(API + "/qr/" + id);
    const data = await res.json();

    if (!data.qr) {
      container.innerHTML = `
        <p>Estado: ${data.status}</p>
        <p>Esperando QR...</p>
      `;
      setTimeout(conectarWhatsApp, 3000);
      return;
    }

    container.innerHTML = `
      <p>Estado: ${data.status}</p>
      <img src="${data.qr}" style="width:300px;" />
      <p>Escaneá con WhatsApp</p>
    `;
  } catch (e) {
    container.innerHTML = "Error cargando QR";
  }
}

</script>

</body>
</html>
