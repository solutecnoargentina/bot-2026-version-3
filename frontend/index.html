<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solutecno SaaS</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#0f172a;
color:white;
}

.container{
margin-top:50px;
}

img{
margin-top:20px;
background:white;
padding:10px;
border-radius:10px;
}

.status{
margin-top:20px;
font-size:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>Conectar WhatsApp</h1>
<hr>

<h2>Clientes</h2>
<h3>Crear Cliente</h3>

<input id="nombreCliente" placeholder="Nombre">
<input id="telefonoCliente" placeholder="Teléfono">

<button onclick="crearCliente()">Crear cliente</button>
<button onclick="cargarClientes()">Ver clientes</button>

<ul id="listaClientes"></ul>

<div class="status" id="status">Cargando...</div>

<img id="qr" width="250"/>

</div>

<script>

async function loadQR(){
  try{
    const res = await fetch("http://72.60.12.34:3000/qr");
    const data = await res.json();

    document.getElementById("status").innerText = data.status;

    if(data.qr){
      document.getElementById("qr").src = data.qr;
    }

  }catch(e){
    console.log("Error:", e);
  }
}

// actualizar cada 3 segundos
setInterval(loadQR, 3000);
loadQR();

</script>
<script>

async function cargarClientes(){
  try{
    const res = await fetch("http://72.60.12.34:3000/clientes");
    const data = await res.json();

    const lista = document.getElementById("listaClientes");
    lista.innerHTML = "";

    data.forEach(c => {
      const li = document.createElement("li");
      li.innerText = c.nombre + " - " + c.telefono;
      lista.appendChild(li);
    });

  }catch(e){
    console.log(e);
  }
}

</script>
<script>

async function crearCliente(){
  const nombre = document.getElementById("nombreCliente").value;
  const telefono = document.getElementById("telefonoCliente").value;

  if(!nombre || !telefono){
    alert("Completar datos");
    return;
  }

  try{
    const res = await fetch("http://72.60.12.34:3000/clientes", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        nombre,
        telefono
      })
    });

    const data = await res.json();

    alert(data.status || data.error);

    cargarClientes();

  }catch(e){
    console.log(e);
  }
}

</script>
</body>
</html>
