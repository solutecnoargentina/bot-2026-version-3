<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solutecno SaaS</title>

<style>
body{
  font-family:Arial;
  background:#0b132b;
  color:white;
  text-align:center;
}

input,button,select{
  padding:8px;
  margin:5px;
}

hr{
  margin:40px 0;
}
</style>

</head>
<body>

<h1>Conectar WhatsApp</h1>

<hr>

<h2>Clientes</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<button>Crear cliente</button>

<h3>Lista de Clientes</h3>
<button>Ver clientes</button>

<hr>

<h2>Instancias</h2>

<input id="clienteId" placeholder="ID Cliente">
<select>
<option>Demo</option>
</select>
<button>Crear instancia</button>

<h3>Lista de Instancias</h3>
<button>Ver instancias</button>

<hr>

<h2>Conectar WhatsApp</h2>

<input id="instanciaId" value="1">
<button onclick="conectarWhatsApp()">Conectar</button>

<div id="qrContainer" style="margin-top:20px;"></div>

<script>
async function conectarWhatsApp() {
  const id = document.getElementById("instanciaId").value;

  const container = document.getElementById("qrContainer");
  container.innerHTML = "Cargando QR...";

  try {
    const res = await fetch("http://72.60.12.34:3000/qr/" + id);
    const data = await res.json();

    if (!data.qr) {
      container.innerHTML = `
        <p>Estado: ${data.status}</p>
        <p>Esperando QR...</p>
      `;
      setTimeout(conectarWhatsApp, 3000);
      return;
    }

    container.innerHTML = `
      <p>Estado: ${data.status}</p>
      <img src="${data.qr}" style="width:300px;" />
      <p>Escaneá con WhatsApp</p>
    `;
  } catch (e) {
    container.innerHTML = "Error cargando QR";
  }
}
</script>

</body>
</html>
